<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #405DE6, #5851DB, #833AB4, #C13584, #E1306C, #FD1D1D);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #833AB4; margin-bottom: 10px; font-size: 28px; }
        p { color: #888; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus { border-color: #833AB4; }
        .quality-label {
            text-align: left;
            color: #555;
            font-size: 14px;
            margin-bottom: 8px;
        }
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            color: #333;
            background: white;
            cursor: pointer;
        }
        select:focus { border-color: #833AB4; }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #833AB4, #E1306C);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .loading { background: #fff3cd; color: #856404; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Instagram Downloader</h1>
        <p>Download Videos and Reels</p>
        <input type="text" id="urlInput" placeholder="Paste Instagram link here...">
        <div class="quality-label">Select Quality:</div>
        <select id="quality">
            <option value="best">High Quality (Best)</option>
            <option value="medium">Medium Quality</option>
            <option value="worst">Low Quality (Small Size)</option>
        </select>
        <button onclick="downloadVideo()">Download Now</button>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('urlInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') downloadVideo();
        });

        async function downloadVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const quality = document.getElementById('quality').value;
            const status = document.getElementById('status');

            if (!url) {
                showStatus('Please enter an Instagram link!', 'error');
                return;
            }

            showStatus('Downloading... Please wait ⏳', 'loading');

            try {
                const response = await fetch('http://127.0.0.1:5000/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, quality: quality })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const downloadUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = 'instagram_download';
                    a.click();
                    showStatus('Download successful! ✅', 'success');
                } else {
                    const err = await response.json();
                    showStatus('Error: ' + err.error, 'error');
                }
            } catch (e) {
                showStatus('Server is not running! Please run python app.py', 'error');
            }
        }

        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = type;
            status.style.display = 'block';
        }
    </script>
</body>
</html>
